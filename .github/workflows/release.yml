name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release --all

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp target/release/zpld-supervisor dist/
          cp target/release/zpldctl dist/
          cp target/release/udp-counter dist/
          tar -czf zpld-${{ github.ref_name }}-linux-x86_64.tar.gz -C dist .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: zpld-${{ github.ref_name }}-linux-x86_64.tar.gz
          generate_release_notes: true
